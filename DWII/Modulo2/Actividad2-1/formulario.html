<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Paso 1: El Formulario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">

    <div class="card p-4 shadow-sm" style="width: 450px;">
        <div class="card-body">
            <h4 class="fw-bold mb-1 text-dark">Registro de Alumno</h4>
            <p class="text-muted small mb-4">Los datos viajarán al servidor al dar clic en enviar.</p>

            <form action="procesar.php" method="POST">
                
                <div class="mb-3">
                    <label class="form-label small fw-bold text-secondary">Nombre Completo</label>
                    <input type="text" name="nombre_alumno" class="form-control" required placeholder="Ej. Carlos Mendoza">
                </div>

                <div class="mb-4">
                    <label class="form-label small fw-bold text-secondary">Programa o Carrera</label>
                    <select name="carrera_alumno" class="form-select" required>
                        <option value="" selected disabled>Selecciona una opción...</option>
                        <option value="Diseño de Contenidos Digitales">Diseño de Contenidos Digitales</option>
                        <option value="Mercadotecnia Integradora">Mercadotecnia Integradora</option>
                        <option value="Ingeniería en Sistemas">Ingeniería en Sistemas</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-dark w-100 rounded-pill">
                    Enviar Datos al Servidor &rarr;
                </button>
            </form>

        </div>
    </div>

</body>
</html>
