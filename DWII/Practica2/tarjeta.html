<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarjeta de Presentación 3D</title>
    <link href="css/bootstrap.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-dark d-flex align-items-center justify-content-center vh-100">

    <div class="tarjeta-contenedor">
        <div class="tarjeta-interna shadow-lg">
            
            <div class="tarjeta-frente d-flex flex-column justify-content-between p-4 text-white">
                <div class="d-flex justify-content-between align-items-center">
                    <span class="fw-bold tracking-wider small">PROD. CONTENIDO</span>
                    <div class="bg-primary rounded-circle" style="width: 12px; height: 12px;"></div>
                </div>
                
                <div class="text-center my-auto">
                    <h2 class="display-6 fw-bold tracking-widest m-0">PORTAFOLIO</h2>
                    <p class="text-secondary small mt-1"></p>
                </div>
                
                <div class="text-start">
                    <span class="text-white-50 small">Haz hover para voltear &rarr;</span>
                </div>
            </div>

            <div class="tarjeta-atras d-flex flex-column justify-content-between p-4 bg-white text-dark">
                <div class="border-bottom pb-2">
                    <h4 class="fw-bold m-0 text-dark">Tu Nombre Aquí</h4>
                    <small class="text-primary fw-semibold text-uppercase tracking-wider">Especialista Multimedia & IT</small>
                </div>
                
                <div class="my-auto py-2">
                    <div class="d-flex align-items-center mb-2">
                        <span class="text-primary fw-bold me-2">&#128231;</span>
                        <span class="small text-muted">info@tuportafolio.com</span>
                    </div>
                    <div class="d-flex align-items-center mb-2">
                        <span class="text-primary fw-bold me-2">&#128187;</span>
                        <span class="small text-muted">www.tuportafolio.com</span>
                    </div>
                    <div class="d-flex align-items-center">
                        <span class="text-primary fw-bold me-2">&#128205;</span>
                        <span class="small text-muted">Monterrey, NL, México</span>
                    </div>
                </div>
                
                <div class="d-flex justify-content-between align-items-center pt-2 border-top">
                    <span class="fw-bold small tracking-wider text-secondary">2026 // BIOTECH & IT</span>
                    <span class="badge bg-dark">vCard</span>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
